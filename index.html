<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICS Calendar Generator</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #f5f5f5;
      margin: 0;
      padding: 40px;
      color: #111;
    }

    .container {
      max-width: 820px;
      margin: auto;
      background: white;
      padding: 28px;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      font-weight: 700;
    }

    .hint {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 22px;
    }

    label {
      display: block;
      margin-top: 18px;
      font-size: 15px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      background: #fff;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
    }

    .checkbox-row input {
      width: auto;
      margin: 0;
    }

    .checkbox-row label {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .month-block {
      margin-top: 20px;
      padding: 18px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fafafa;
    }

    .month-header {
      display: flex;
      gap: 12px;
      align-items: end;
    }

    .month-header > div {
      flex: 1;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .day-button {
      padding: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
      color: #111;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .day-button.selected {
      background: #111;
      color: white;
      border-color: #111;
    }

    .small-button {
      width: auto;
      padding: 11px 14px;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
      background: #eee;
      color: #111;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .small-button:hover {
      background: #ddd;
    }

    .main-button {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .main-button:hover {
      background: #333;
    }

    .remove-button {
      background: #f1f1f1;
      color: #333;
    }

    .section-title {
      margin-top: 26px;
      font-size: 18px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Calendar ICS Generator</h1>
    <p class="hint">
      输入项目名称和备注，然后按月份多选日期，一键生成 .ics 文件。可以导入 Google Calendar、Apple Calendar 或 Outlook。
    </p>

    <label for="projectName">项目名称</label>
    <input id="projectName" placeholder="例如：LINB06" value="LINB06" />

    <label for="note">备注</label>
    <input id="note" placeholder="例如：Problem Set" value="Problem Set" />

    <div class="checkbox-row">
      <input id="allDay" type="checkbox" onchange="toggleTimeInputs()" />
      <label for="allDay">全天事件</label>
    </div>

    <div class="row" id="timeRow">
      <div>
        <label for="startTime">开始时间</label>
        <input id="startTime" type="time" value="09:00" />
      </div>
      <div>
        <label for="endTime">结束时间</label>
        <input id="endTime" type="time" value="10:00" />
      </div>
    </div>

    <label for="location">地点，可选</label>
    <input id="location" placeholder="例如：UTSC / Library / Online" />

    <div class="section-title">选择日期</div>
    <div id="monthContainer"></div>

    <button class="small-button" onclick="addMonthBlock()">添加月份</button>
    <button class="main-button" onclick="generateICS()">生成并下载 ICS 文件</button>
  </div>

  <script>
    let monthBlockId = 0;
    const monthNames = [
      "一月", "二月", "三月", "四月", "五月", "六月",
      "七月", "八月", "九月", "十月", "十一月", "十二月"
    ];

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function daysInMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function formatDate(dateStr) {
      const [year, month, day] = dateStr.split("-").map(Number);
      return `${year}${pad(month)}${pad(day)}`;
    }

    function formatDateTime(dateStr, timeStr) {
      const [year, month, day] = dateStr.split("-").map(Number);
      const [hour, minute] = timeStr.split(":").map(Number);
      return `${year}${pad(month)}${pad(day)}T${pad(hour)}${pad(minute)}00`;
    }

    function getNextDate(dateStr) {
      const date = new Date(dateStr + "T00:00:00");
      date.setDate(date.getDate() + 1);
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function escapeICS(text) {
      return text
        .replace(/\\/g, "\\\\")
        .replace(/,/g, "\\,")
        .replace(/;/g, "\\;")
        .replace(/\n/g, "\\n");
    }

    function generateUID() {
      return Math.random().toString(36).substring(2) + "@ics-generator";
    }

    function toggleTimeInputs() {
      const allDay = document.getElementById("allDay").checked;
      document.getElementById("timeRow").style.display = allDay ? "none" : "grid";
    }

    function createMonthOptions(selectedMonth) {
      return monthNames.map((name, index) => {
        const value = index + 1;
        const selected = value === selectedMonth ? "selected" : "";
        return `<option value="${value}" ${selected}>${name}</option>`;
      }).join("");
    }

    function addMonthBlock(defaultYear = 2026, defaultMonth = 5) {
      monthBlockId++;
      const id = monthBlockId;
      const container = document.getElementById("monthContainer");

      const block = document.createElement("div");
      block.className = "month-block";
      block.dataset.blockId = id;
      block.innerHTML = `
        <div class="month-header">
          <div>
            <label for="year-${id}">年份</label>
            <input id="year-${id}" type="number" value="${defaultYear}" onchange="renderDays(${id})" />
          </div>
          <div>
            <label for="month-${id}">月份</label>
            <select id="month-${id}" onchange="renderDays(${id})">
              ${createMonthOptions(defaultMonth)}
            </select>
          </div>
          <button class="small-button remove-button" onclick="removeMonthBlock(${id})">删除</button>
        </div>
        <div class="days-grid" id="days-${id}"></div>
      `;

      container.appendChild(block);
      renderDays(id);
    }

    function removeMonthBlock(id) {
      const block = document.querySelector(`[data-block-id="${id}"]`);
      if (block) {
        block.remove();
      }
    }

    function renderDays(id) {
      const year = Number(document.getElementById(`year-${id}`).value);
      const month = Number(document.getElementById(`month-${id}`).value);
      const grid = document.getElementById(`days-${id}`);
      const totalDays = daysInMonth(year, month);

      grid.innerHTML = "";

      for (let day = 1; day <= totalDays; day++) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "day-button";
        button.textContent = day;
        button.dataset.date = `${year}-${pad(month)}-${pad(day)}`;
        button.onclick = function () {
          button.classList.toggle("selected");
        };
        grid.appendChild(button);
      }
    }

    function getSelectedDates() {
      return Array.from(document.querySelectorAll(".day-button.selected"))
        .map(button => button.dataset.date)
        .sort();
    }

    function generateICS() {
      const projectName = document.getElementById("projectName").value.trim();
      const note = document.getElementById("note").value.trim();
      const startTime = document.getElementById("startTime").value;
      const endTime = document.getElementById("endTime").value;
      const location = document.getElementById("location").value.trim();
      const allDay = document.getElementById("allDay").checked;
      const dates = getSelectedDates();

      if (!projectName || !note) {
        alert("请填写项目名称和备注。");
        return;
      }

      if (dates.length === 0) {
        alert("请至少选择一个日期。");
        return;
      }

      if (!allDay && (!startTime || !endTime)) {
        alert("请填写开始时间和结束时间，或勾选全天事件。");
        return;
      }

      const now = new Date();
      const timestamp = now.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";

      let ics = "BEGIN:VCALENDAR\r\n";
      ics += "VERSION:2.0\r\n";
      ics += "PRODID:-//Simple ICS Generator//EN\r\n";
      ics += "CALSCALE:GREGORIAN\r\n";

      dates.forEach(date => {
        const title = `${projectName} - ${note}`;

        ics += "BEGIN:VEVENT\r\n";
        ics += `UID:${generateUID()}\r\n`;
        ics += `DTSTAMP:${timestamp}\r\n`;

        if (allDay) {
          ics += `DTSTART;VALUE=DATE:${formatDate(date)}\r\n`;
          ics += `DTEND;VALUE=DATE:${formatDate(getNextDate(date))}\r\n`;
        } else {
          ics += `DTSTART:${formatDateTime(date, startTime)}\r\n`;
          ics += `DTEND:${formatDateTime(date, endTime)}\r\n`;
        }

        ics += `SUMMARY:${escapeICS(title)}\r\n`;
        ics += `DESCRIPTION:${escapeICS(note)}\r\n`;

        if (location) {
          ics += `LOCATION:${escapeICS(location)}\r\n`;
        }

        ics += "END:VEVENT\r\n";
      });

      ics += "END:VCALENDAR\r\n";

      const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${projectName}_${note}.ics`.replace(/\s+/g, "_");
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    addMonthBlock(2026, 5);
    addMonthBlock(2026, 6);
  </script>
</body>
</html>
